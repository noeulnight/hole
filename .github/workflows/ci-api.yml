name: CI API

on:
  pull_request:
    paths:
      - '.github/workflows/ci-api.yml'
      - 'apps/api/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'Dockerfile'
  push:
    branches: ['main']
    paths:
      - '.github/workflows/ci-api.yml'
      - 'apps/api/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build API
        run: pnpm build:api
